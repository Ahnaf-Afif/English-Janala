<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- daisyui link -->

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <nav class="bg-base-100">
      <div class="navbar bg-base-100 shadow-sm">
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <li><a>FAQ</a></li>
              <li>
                <a>Learn</a>
              </li>
              <li><a>Log Out</a></li>
            </ul>
          </div>
          <div class="flex gap-1 items-center justify-center">
            <span class="text-lg font-bold">English</span>
            <img src="./assets/logo.png" alt="" />
            <span class="font-semibold">জানালা</span>
          </div>
        </div>
        <div class="navbar-end hidden lg:flex">
          <ul class="menu menu-horizontal px-1 space-x-4">
            <li>
              <button class="btn btn-outline btn-primary">
                <img src="./assets/fa-circle-question.png" alt="" /> FAQ
              </button>
            </li>
            <li>
              <button class="btn btn-outline btn-primary">
                <img src="./assets/fa-book-open.png" alt="" /> Learn
              </button>
            </li>
            <li>
              <button class="btn btn-outline btn-primary">
                <img src="./assets/fa-arrow-right-from-bracket.png" alt="" />
                Log Out
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <section class="md:mt-10">
      <div
        class="flex md:flex-row flex-col-reverse mx-auto w-11/12 items-center space-x-40"
      >
        <div class="md:flex-1 space-y-5 text-center md:text-left mx-auto">
          <p class="text-4xl font-bold">
            <span class="text-blue-600">English</span> is Easy!!
          </p>
          <p class="max-w-[500px]">
            আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
            আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে
            অন্য একটি Level এ
          </p>
          <div class="">
            <div class="flex justify-center items-center md:block">
              <div class="card w-full max-w-sm shrink-0">
                <div class="card-body">
                  <fieldset class="fieldset">
                    <label class="label">Email</label>
                    <input type="email" class="input" placeholder="Email" />
                    <label class="label">Password</label>
                    <input
                      type="password"
                      class="input"
                      placeholder="Password"
                    />
                    <div><a class="link link-hover">Forgot password?</a></div>
                    <button class="btn btn-neutral mt-4">Login</button>
                  </fieldset>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="flex-1 max-w-[500px]">
          <img src="./assets/hero-student.png" alt="" />
        </div>
      </div>
    </section>

    <section class="mt-20">
      <div class="space-y-10">
        <p class="text-4xl font-bold text-center">
          <span class="text-blue-600">Let's</span> Learn Vocabularies
        </p>
        <div
          id="level-container"
          class="flex gap-5 flex-wrap justify-center"
        ></div>
      </div>
    </section>

    <section class="pt-10">
      <div
        id="word-container"
        class="bg-gray-100 w-11/12 mx-auto grid grid-cols-3 gap-5"
      ></div>
    </section>

    <script src="./script/script.js"></script>
  </body>
</html>
